<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri & Memory — Casemix RS. Wava Husada</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito+Sans:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#0d6e7a; --teal-dark:#094e58; --teal-light:#1a8fa0;
  --green:#1f9068; --green-light:#27b880;
  --orange:#e8821e; --orange-light:#f4a44a;
  --cream:#f5f0e8; --cream-dark:#ede5d8;
  --dark:#122830; --dark-2:#1e3d47;
  --gray:#6b8a92; --gray-light:#b8cdd2;
  --white:#fff; --red:#c0392b;
  --radius:12px; --shadow:0 4px 20px rgba(18,40,48,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans',sans-serif;background:#f0ede8;color:var(--dark);min-height:100vh}
a{text-decoration:none;color:inherit}

/* ── Navbar ── */
.navbar{
  position:sticky;top:0;z-index:200;
  background:var(--teal-dark);padding:0 5%;height:48px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 12px rgba(0,0,0,.2);
  gap:16px;
}
.nav-brand{font-family:'Playfair Display',serif;font-size:16px;color:white;font-weight:700;white-space:nowrap}
.nav-breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,.6);font-weight:600}
.nav-breadcrumb a{color:rgba(255,255,255,.7);transition:.2s}
.nav-breadcrumb a:hover{color:white}
.nav-breadcrumb .sep{opacity:.4}
.nav-breadcrumb .current{color:var(--orange-light);font-weight:700}
.nav-back{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  color:white;padding:6px 14px;border-radius:50px;font-size:13px;font-weight:700;
  transition:.2s;white-space:nowrap;
}
.nav-back:hover{background:rgba(255,255,255,.2)}

/* ── Page Body ── */
.page-body{padding:20px 24px}

/* ── Two-column grid ── */
.two-col{
  display:grid;
  grid-template-columns:1.55fr 1fr;
  gap:16px;
  align-items:start;
  max-width:1200px;
  margin:0 auto;
}

/* ── Card base ── */
.card{
  background:var(--white);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}

/* ── Card header ── */
.card-header{
  background:var(--teal-dark);
  color:white;
  padding:14px 20px;
  font-size:15px;
  font-weight:800;
  display:flex;align-items:center;gap:8px;
}
.card-header .count-badge{
  background:rgba(255,255,255,.2);
  color:white;
  border-radius:50px;
  padding:2px 10px;
  font-size:12px;
  font-family:'Space Mono',monospace;
  font-weight:700;
  margin-left:auto;
}

/* ── Card body ── */
.card-body{padding:20px}

/* ── Upload zone ── */
.drop-zone{
  border:2px dashed var(--gray-light);border-radius:10px;
  padding:28px 20px;text-align:center;cursor:pointer;
  transition:.2s;background:var(--cream);position:relative;
  margin-bottom:16px;
}
.drop-zone:hover,.drop-zone.drag-over{
  border-color:var(--teal);background:rgba(13,110,122,.04);
}
.dz-icon{font-size:32px;margin-bottom:8px;display:block}
.dz-text{font-size:13px;color:var(--gray);font-weight:600}
.dz-hint{font-size:11px;color:var(--gray-light);margin-top:4px}
.drop-zone input[type=file]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
}

/* Preview thumbnail */
.preview-row{
  display:flex;align-items:center;gap:12px;
  background:var(--cream);border-radius:10px;padding:12px;
  margin-bottom:14px;
}
.preview-thumb{
  width:70px;height:70px;object-fit:cover;
  border-radius:8px;border:2px solid var(--cream-dark);flex-shrink:0;
}
.preview-info{flex:1;min-width:0}
.preview-name{font-size:13px;font-weight:700;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preview-size{font-size:11px;color:var(--gray);margin-top:2px}
.preview-clear{
  background:none;border:none;cursor:pointer;
  color:var(--gray);font-size:17px;padding:4px 8px;border-radius:6px;transition:.2s;flex-shrink:0;
}
.preview-clear:hover{color:var(--red);background:rgba(192,57,43,.08)}

/* Caption input */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.form-group input{
  width:100%;border:1.5px solid var(--cream-dark);border-radius:8px;
  padding:9px 13px;font-size:14px;font-family:'Nunito Sans',sans-serif;
  background:var(--cream);color:var(--dark);transition:.2s;outline:none;
}
.form-group input:focus{border-color:var(--teal);background:white}

/* Upload button */
.btn-upload{
  width:100%;display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--teal-dark);
  color:white;border:none;border-radius:9px;padding:11px 20px;
  font-size:14px;font-weight:800;font-family:'Nunito Sans',sans-serif;
  cursor:pointer;transition:.2s;
}
.btn-upload:hover{background:var(--teal)}
.btn-upload:disabled{opacity:.5;cursor:not-allowed}
.btn-upload .spinner{
  width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
  border-top-color:white;border-radius:50%;
  animation:spin .7s linear infinite;display:none;flex-shrink:0;
}
.btn-upload.loading .spinner{display:block}
.btn-upload.loading .btn-label{display:none}

/* Alert */
.alert{
  border-radius:8px;padding:10px 14px;font-size:13px;font-weight:700;
  margin-top:12px;display:none;align-items:center;gap:8px;
}
.alert.show{display:flex}
.alert-ok{background:rgba(31,144,104,.1);color:var(--green);border:1px solid rgba(31,144,104,.2)}
.alert-err{background:rgba(192,57,43,.1);color:var(--red);border:1px solid rgba(192,57,43,.2)}

/* ── Photo grid (right column) ── */
.photo-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* Gallery item */
.gallery-item{
  background:var(--white);border-radius:8px;overflow:hidden;
  border:1.5px solid var(--cream-dark);box-shadow:0 2px 8px rgba(18,40,48,.06);
  opacity:0;transform:scale(0.97);
  transition:opacity .35s ease, transform .35s ease, box-shadow .25s ease;
  position:relative;cursor:pointer;
}
.gallery-item.revealed{opacity:1;transform:scale(1)}
.gallery-item:hover{box-shadow:0 6px 24px rgba(18,40,48,.13)}
.gallery-item:hover .gi-img{transform:scale(1.03)}
.gallery-item:hover .btn-delete{opacity:1;transform:scale(1)}

.gi-img-wrap{
  aspect-ratio:4/3;overflow:hidden;background:var(--cream-dark);
  position:relative;
}
.gi-img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .3s ease;display:block;
}
.gi-img-placeholder{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:32px;color:var(--gray-light);
}
.btn-delete{
  position:absolute;top:6px;right:6px;
  background:rgba(192,57,43,.85);backdrop-filter:blur(4px);
  border:none;border-radius:7px;
  color:white;width:28px;height:28px;cursor:pointer;
  font-size:12px;display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(0.8);
  transition:opacity .2s ease, transform .2s ease, background .15s ease;
  z-index:5;
}
.btn-delete:hover{background:var(--red)}

.gi-body{padding:8px 10px}
.gi-caption{
  font-size:12px;font-weight:700;color:var(--dark);
  line-height:1.4;margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.gi-caption.empty{color:var(--gray-light);font-style:italic;font-weight:400}
.gi-date{
  font-size:10px;color:var(--gray);font-family:'Space Mono',monospace;
  display:flex;align-items:center;gap:3px;
}

/* Empty state */
.empty-state{
  grid-column:1/-1;
  text-align:center;padding:48px 16px;
  border:2px dashed var(--cream-dark);border-radius:10px;
}
.empty-state .es-icon{font-size:40px;margin-bottom:12px;display:block}
.empty-state .es-title{font-size:14px;font-weight:800;color:var(--gray);margin-bottom:5px}
.empty-state .es-sub{font-size:12px;color:var(--gray-light)}

/* Skeleton */
.skeleton-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.skeleton-card{
  background:var(--cream);border-radius:8px;overflow:hidden;
  border:1.5px solid var(--cream-dark);
}
.skel{background:linear-gradient(90deg, var(--cream-dark) 25%, var(--cream) 50%, var(--cream-dark) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite}
.skel-img{aspect-ratio:4/3;width:100%}
.skel-body{padding:10px;display:flex;flex-direction:column;gap:6px}
.skel-line{height:11px;border-radius:6px;width:80%}
.skel-line.short{width:50%;height:9px}

@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Lightbox ── */
.lightbox-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.85);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s ease;
}
.lightbox-overlay.open{opacity:1;pointer-events:all}
.lightbox-inner{position:relative;max-width:90vw;max-height:90vh;display:flex;flex-direction:column;align-items:center}
.lightbox-img{
  max-width:90vw;max-height:80vh;object-fit:contain;
  border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.5);
  display:block;
}
.lightbox-caption{
  color:rgba(255,255,255,.85);font-size:14px;font-weight:600;
  margin-top:14px;text-align:center;max-width:600px;
  padding:0 20px;
}
.lightbox-date{color:rgba(255,255,255,.4);font-size:12px;font-family:'Space Mono',monospace;margin-top:4px;text-align:center}
.lb-btn{
  position:fixed;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.1);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.15);
  color:white;width:46px;height:46px;border-radius:50%;
  font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.2s;z-index:1001;
}
.lb-btn:hover{background:rgba(255,255,255,.2)}
.lb-btn.prev{left:16px}
.lb-btn.next{right:16px}
.lb-btn:disabled{opacity:.25;cursor:default}
.lb-close{
  position:fixed;top:16px;right:16px;z-index:1001;
  background:rgba(255,255,255,.1);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.15);
  color:white;width:40px;height:40px;border-radius:50%;
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.2s;
}
.lb-close:hover{background:rgba(192,57,43,.6)}
.lb-counter{
  position:fixed;top:18px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.5);backdrop-filter:blur(4px);
  color:rgba(255,255,255,.75);
  padding:4px 12px;border-radius:50px;
  font-size:12px;font-family:'Space Mono',monospace;
}

/* ── Delete Confirm Modal ── */
.modal-overlay{
  position:fixed;inset:0;z-index:900;
  background:rgba(0,0,0,.5);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s ease;
  padding:20px;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-card{
  background:var(--white);border-radius:var(--radius);
  box-shadow:0 20px 60px rgba(0,0,0,.2);
  padding:28px;max-width:420px;width:100%;
  transform:scale(.95);transition:transform .2s ease;
}
.modal-overlay.open .modal-card{transform:scale(1)}
.modal-icon{font-size:30px;margin-bottom:12px;display:block}
.modal-title{font-size:17px;font-weight:800;color:var(--dark);margin-bottom:8px}
.modal-desc{font-size:13px;color:var(--gray);line-height:1.6;margin-bottom:8px}
.modal-fname{
  font-size:13px;font-weight:700;color:var(--teal-dark);
  background:var(--cream);border-radius:8px;padding:8px 12px;
  word-break:break-all;margin-bottom:20px;
}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{
  padding:9px 20px;border-radius:10px;
  background:var(--cream);border:1.5px solid var(--cream-dark);
  color:var(--gray);font-size:13px;font-weight:700;font-family:'Nunito Sans',sans-serif;
  cursor:pointer;transition:.2s;
}
.btn-cancel:hover{background:var(--cream-dark)}
.btn-del{
  padding:9px 20px;border-radius:10px;
  background:var(--red);border:none;
  color:white;font-size:13px;font-weight:800;font-family:'Nunito Sans',sans-serif;
  cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px;
}
.btn-del:hover{background:#a93226}
.btn-del:disabled{opacity:.5;cursor:not-allowed}
.btn-del .del-spinner{
  width:13px;height:13px;border:2px solid rgba(255,255,255,.3);
  border-top-color:white;border-radius:50%;
  animation:spin .7s linear infinite;display:none;
}
.btn-del.loading .del-spinner{display:block}
.btn-del.loading .del-label{display:none}

/* ── Responsive ── */
@media(max-width:768px){
  .page-body{padding:14px 12px}
  .two-col{grid-template-columns:1fr}
  .nav-breadcrumb{display:none}
}
@media(max-width:480px){
  .photo-grid,.skeleton-grid{grid-template-columns:1fr 1fr;gap:8px}
  .modal-actions{flex-direction:column-reverse}
  .btn-cancel,.btn-del{width:100%;justify-content:center}
}
</style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar">
  <div class="nav-brand">🏥 Casemix</div>
  <div class="nav-breadcrumb">
    <a href="/">Dairy Meruno</a>
    <span class="sep">›</span>
    <a href="/casemix">Casemix</a>
    <span class="sep">›</span>
    <span class="current">Galeri &amp; Memory</span>
  </div>
  <a href="/casemix" class="nav-back">← Casemix</a>
</nav>

<!-- ── Page Body ── -->
<div class="page-body">
  <div class="two-col">

    <!-- LEFT: Upload card -->
    <div class="card">
      <div class="card-header">📤 Upload Foto</div>
      <div class="card-body">

        <div class="drop-zone" id="dropZone">
          <span class="dz-icon">🖼️</span>
          <div class="dz-text">Drag &amp; drop foto di sini, atau klik untuk pilih</div>
          <div class="dz-hint">JPG, PNG, GIF, WEBP · Maks 10 MB</div>
          <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.gif,.webp">
        </div>

        <!-- Preview -->
        <div class="preview-row" id="previewRow" style="display:none">
          <img class="preview-thumb" id="previewThumb" src="" alt="Preview">
          <div class="preview-info">
            <div class="preview-name" id="previewName"></div>
            <div class="preview-size" id="previewSize"></div>
          </div>
          <button class="preview-clear" id="previewClear" title="Batal">✕</button>
        </div>

        <div class="form-group">
          <label for="captionInput">Caption / Keterangan</label>
          <input type="text" id="captionInput" placeholder="Contoh: Rapat koordinasi tim casemix..." maxlength="200">
        </div>

        <button class="btn-upload" id="btnUpload" disabled>
          <div class="spinner"></div>
          <span class="btn-label">📷 Upload Foto</span>
        </button>

        <div class="alert alert-ok" id="alertOk">✅ <span id="alertOkMsg">Foto berhasil diupload!</span></div>
        <div class="alert alert-err" id="alertErr">❌ <span id="alertErrMsg">Terjadi kesalahan.</span></div>
      </div>
    </div>

    <!-- RIGHT: Photo grid card -->
    <div class="card">
      <div class="card-header">
        🖼️ Galeri Foto
        <span class="count-badge" id="countBadge">0</span>
      </div>
      <div class="card-body">

        <!-- Skeleton Loader -->
        <div class="skeleton-grid" id="skeletonGrid">
          <div class="skeleton-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel skel-line"></div><div class="skel skel-line short"></div></div></div>
          <div class="skeleton-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel skel-line"></div><div class="skel skel-line short"></div></div></div>
          <div class="skeleton-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel skel-line"></div><div class="skel skel-line short"></div></div></div>
          <div class="skeleton-card"><div class="skel skel-img"></div><div class="skel-body"><div class="skel skel-line"></div><div class="skel skel-line short"></div></div></div>
        </div>

        <!-- Photo Grid -->
        <div class="photo-grid" id="galleryGrid" style="display:none"></div>

      </div>
    </div>

  </div>
</div>

<!-- ── Lightbox ── -->
<div class="lightbox-overlay" id="lightbox" role="dialog" aria-modal="true" aria-label="Lightbox foto">
  <button class="lb-close" id="lbClose" title="Tutup (Esc)">✕</button>
  <span class="lb-counter" id="lbCounter"></span>
  <button class="lb-btn prev" id="lbPrev" title="Sebelumnya">‹</button>
  <div class="lightbox-inner">
    <img class="lightbox-img" id="lbImg" src="" alt="">
    <div class="lightbox-caption" id="lbCaption"></div>
    <div class="lightbox-date" id="lbDate"></div>
  </div>
  <button class="lb-btn next" id="lbNext" title="Berikutnya">›</button>
</div>

<!-- ── Delete Confirm Modal ── -->
<div class="modal-overlay" id="deleteModal" role="dialog" aria-modal="true">
  <div class="modal-card">
    <span class="modal-icon">🗑️</span>
    <div class="modal-title">Hapus Foto?</div>
    <div class="modal-desc">Foto ini akan dihapus permanen dan tidak dapat dipulihkan.</div>
    <div class="modal-fname" id="modalFname">–</div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modalCancel">Batal</button>
      <button class="btn-del" id="modalConfirm">
        <div class="del-spinner"></div>
        <span class="del-label">🗑️ Hapus</span>
      </button>
    </div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────────────────
   State
───────────────────────────────────────────────────── */
let gallery = [];          // array of entry objects from API
let currentIndex = -1;     // lightbox index
let deleteTargetId = null; // id to delete
let selectedFile = null;   // File object selected for upload

/* ─────────────────────────────────────────────────────
   Helpers
───────────────────────────────────────────────────── */
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmtBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

function fmtSz(b){ if(!b)return'—'; if(b<1048576)return(b/1024).toFixed(0)+' KB'; return(b/1048576).toFixed(1)+' MB'; }
function sizeNotice(orig,comp){
  if(!orig||!comp) return '';
  const pct = orig>comp ? Math.round((1-comp/orig)*100) : 0;
  return pct>1
    ? `<br><small style="opacity:.8;font-size:11px">📦 ${fmtSz(orig)} → ${fmtSz(comp)} (hemat ${pct}%)</small>`
    : `<br><small style="opacity:.8;font-size:11px">📦 Ukuran: ${fmtSz(comp)}</small>`;
}
function showAlert(type, msg) {
  const ok = document.getElementById('alertOk');
  const err = document.getElementById('alertErr');
  ok.classList.remove('show');
  err.classList.remove('show');
  if (type === 'ok') {
    document.getElementById('alertOkMsg').innerHTML = msg;
    ok.classList.add('show');
    setTimeout(() => ok.classList.remove('show'), 5000);
  } else {
    document.getElementById('alertErrMsg').innerHTML = msg;
    err.classList.add('show');
    setTimeout(() => err.classList.remove('show'), 7000);
  }
}

/* ─────────────────────────────────────────────────────
   File Picker / Drag-Drop
───────────────────────────────────────────────────── */
const fileInput   = document.getElementById('fileInput');
const dropZone    = document.getElementById('dropZone');
const previewRow  = document.getElementById('previewRow');
const previewThumb = document.getElementById('previewThumb');
const previewName = document.getElementById('previewName');
const previewSize = document.getElementById('previewSize');
const previewClear = document.getElementById('previewClear');
const btnUpload   = document.getElementById('btnUpload');

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) applyFile(fileInput.files[0]);
});

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && /\.(jpe?g|png|gif|webp)$/i.test(f.name)) applyFile(f);
  else showAlert('err', 'Format tidak didukung. Gunakan JPG, PNG, GIF, atau WebP.');
});

function applyFile(f) {
  selectedFile = f;
  const url = URL.createObjectURL(f);
  previewThumb.src = url;
  previewName.textContent = f.name;
  previewSize.textContent = fmtBytes(f.size);
  previewRow.style.display = 'flex';
  btnUpload.disabled = false;
}

previewClear.addEventListener('click', clearFile);
function clearFile() {
  selectedFile = null;
  fileInput.value = '';
  previewThumb.src = '';
  previewRow.style.display = 'none';
  btnUpload.disabled = true;
}

/* ─────────────────────────────────────────────────────
   Upload
───────────────────────────────────────────────────── */
btnUpload.addEventListener('click', async () => {
  if (!selectedFile) return;
  const caption = document.getElementById('captionInput').value.trim();

  const fd = new FormData();
  fd.append('file', selectedFile);
  if (caption) fd.append('caption', caption);

  btnUpload.classList.add('loading');
  btnUpload.disabled = true;

  try {
    const res = await fetch('/casemix/upload/galeri', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.error || 'Upload gagal');

    gallery.unshift(data.entry);
    renderGallery();
    updateStats();
    clearFile();
    document.getElementById('captionInput').value = '';
    showAlert('ok', '✅ Foto berhasil diupload!' + sizeNotice(data.original_size, data.compressed_size));
  } catch (e) {
    showAlert('err', e.message || 'Gagal upload. Coba lagi.');
  } finally {
    btnUpload.classList.remove('loading');
    btnUpload.disabled = !selectedFile;
  }
});

/* ─────────────────────────────────────────────────────
   Load Gallery
───────────────────────────────────────────────────── */
async function loadGallery() {
  try {
    const res = await fetch('/casemix/api/files/galeri');
    if (!res.ok) throw new Error('Gagal memuat data');
    const data = await res.json();
    gallery = data.files || [];
  } catch (e) {
    gallery = [];
    showAlert('err', 'Gagal memuat galeri: ' + e.message);
  }
  document.getElementById('skeletonGrid').style.display = 'none';
  document.getElementById('galleryGrid').style.display = 'grid';
  renderGallery();
  updateStats();
}

/* ─────────────────────────────────────────────────────
   Render Gallery
───────────────────────────────────────────────────── */
function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  document.getElementById('countBadge').textContent = gallery.length;

  if (gallery.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <span class="es-icon">📷</span>
        <div class="es-title">Belum ada foto</div>
        <div class="es-sub">Upload foto kegiatan Instalasi Casemix menggunakan form di sebelah kiri.</div>
      </div>`;
    return;
  }

  grid.innerHTML = gallery.map((entry, idx) => {
    const capText = entry.caption || '';
    const capClass = capText ? '' : ' empty';
    const capDisplay = capText || 'Tanpa keterangan';
    return `
    <div class="gallery-item" data-idx="${idx}" data-id="${escAttr(entry.id)}">
      <div class="gi-img-wrap">
        <img class="gi-img"
          src="${escHtml(entry.img_url)}"
          alt="${escAttr(capText || entry.original_name)}"
          loading="lazy"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="gi-img-placeholder" style="display:none">🖼️</div>
        <button class="btn-delete" data-id="${escAttr(entry.id)}" data-name="${escAttr(entry.original_name)}" title="Hapus foto">🗑️</button>
      </div>
      <div class="gi-body">
        <div class="gi-caption${capClass}">${escHtml(capDisplay)}</div>
        <div class="gi-date">🕐 ${escHtml(entry.uploaded_at_display || '')}${entry.size ? `<span style="font-size:11px;opacity:0.5"> · ${fmtSz(entry.size)}</span>` : ''}</div>
      </div>
    </div>`;
  }).join('');

  // Staggered reveal animation
  const items = grid.querySelectorAll('.gallery-item');
  items.forEach((el, i) => {
    setTimeout(() => el.classList.add('revealed'), i * 60);
  });

  // Click foto → lightbox
  grid.querySelectorAll('.gallery-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.btn-delete')) return;
      const idx = parseInt(el.dataset.idx, 10);
      openLightbox(idx);
    });
  });

  // Delete buttons
  grid.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openDeleteModal(btn.dataset.id, btn.dataset.name);
    });
  });
}

function updateStats() {
  document.getElementById('countBadge').textContent = gallery.length;
}

/* ─────────────────────────────────────────────────────
   Lightbox
───────────────────────────────────────────────────── */
const lightbox  = document.getElementById('lightbox');
const lbImg     = document.getElementById('lbImg');
const lbCaption = document.getElementById('lbCaption');
const lbDate    = document.getElementById('lbDate');
const lbCounter = document.getElementById('lbCounter');
const lbPrev    = document.getElementById('lbPrev');
const lbNext    = document.getElementById('lbNext');

function openLightbox(idx) {
  currentIndex = idx;
  updateLightbox();
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
  currentIndex = -1;
}

function updateLightbox() {
  if (currentIndex < 0 || currentIndex >= gallery.length) return;
  const entry = gallery[currentIndex];
  lbImg.src = entry.img_url;
  lbImg.alt = entry.caption || entry.original_name;
  lbCaption.textContent = entry.caption || '';
  lbDate.textContent = entry.uploaded_at_display || '';
  lbCounter.textContent = (currentIndex + 1) + ' / ' + gallery.length;
  lbPrev.disabled = currentIndex === 0;
  lbNext.disabled = currentIndex === gallery.length - 1;
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);

lightbox.addEventListener('click', e => {
  if (e.target === lightbox) closeLightbox();
});

lbPrev.addEventListener('click', e => {
  e.stopPropagation();
  if (currentIndex > 0) { currentIndex--; updateLightbox(); }
});
lbNext.addEventListener('click', e => {
  e.stopPropagation();
  if (currentIndex < gallery.length - 1) { currentIndex++; updateLightbox(); }
});

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft' && currentIndex > 0) { currentIndex--; updateLightbox(); }
  if (e.key === 'ArrowRight' && currentIndex < gallery.length - 1) { currentIndex++; updateLightbox(); }
});

/* ─────────────────────────────────────────────────────
   Delete Modal
───────────────────────────────────────────────────── */
const deleteModal  = document.getElementById('deleteModal');
const modalFname   = document.getElementById('modalFname');
const modalCancel  = document.getElementById('modalCancel');
const modalConfirm = document.getElementById('modalConfirm');

function openDeleteModal(id, name) {
  deleteTargetId = id;
  modalFname.textContent = name || id;
  deleteModal.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDeleteModal() {
  deleteModal.classList.remove('open');
  document.body.style.overflow = '';
  deleteTargetId = null;
}

modalCancel.addEventListener('click', closeDeleteModal);
deleteModal.addEventListener('click', e => {
  if (e.target === deleteModal) closeDeleteModal();
});

modalConfirm.addEventListener('click', async () => {
  if (!deleteTargetId) return;
  modalConfirm.classList.add('loading');
  modalConfirm.disabled = true;

  try {
    const res = await fetch('/casemix/delete/galeri/' + deleteTargetId, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.error || 'Gagal menghapus');

    gallery = gallery.filter(e => e.id !== deleteTargetId);
    renderGallery();
    updateStats();
    closeDeleteModal();
    showAlert('ok', 'Foto berhasil dihapus.');
  } catch (e) {
    showAlert('err', 'Gagal menghapus: ' + e.message);
    closeDeleteModal();
  } finally {
    modalConfirm.classList.remove('loading');
    modalConfirm.disabled = false;
  }
});

/* ─────────────────────────────────────────────────────
   Init
───────────────────────────────────────────────────── */
loadGallery();
</script>
</body>
</html>
