<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot News — Casemix RS. Wava Husada</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Nunito+Sans:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#0d6e7a; --teal-dark:#094e58; --teal-light:#1a8fa0;
  --green:#1f9068; --green-light:#27b880;
  --orange:#e8821e; --orange-light:#f4a44a;
  --cream:#f5f0e8; --cream-dark:#ede5d8;
  --dark:#122830; --dark-2:#1e3d47;
  --gray:#6b8a92; --gray-light:#b8cdd2;
  --white:#fff; --red:#c0392b;
  --radius:12px; --shadow:0 4px 20px rgba(18,40,48,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans',sans-serif;background:#f0ede8;color:var(--dark);min-height:100vh}
a{text-decoration:none;color:inherit}

/* ── Navbar ── */
.navbar{
  position:sticky;top:0;z-index:100;
  background:var(--teal-dark);padding:0 5%;height:48px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 12px rgba(0,0,0,.2);
}
.nav-brand{font-family:'Playfair Display',serif;font-size:16px;color:white;font-weight:700;white-space:nowrap}
.nav-breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,.6);font-weight:600}
.nav-breadcrumb a{color:rgba(255,255,255,.7);transition:.2s}
.nav-breadcrumb a:hover{color:white}
.nav-breadcrumb .sep{opacity:.4}
.nav-breadcrumb .current{color:var(--orange-light);font-weight:700}
.nav-back{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  color:white;padding:6px 14px;border-radius:50px;font-size:13px;font-weight:700;
  transition:.2s;
}
.nav-back:hover{background:rgba(255,255,255,.2)}

/* ── Page Body ── */
.page-body{padding:20px 24px}

/* ── Two-column grid ── */
.two-col{
  display:grid;
  grid-template-columns:1.55fr 1fr;
  gap:16px;
  align-items:start;
  max-width:1200px;
  margin:0 auto;
}

/* ── Card base ── */
.card{
  background:var(--white);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}

/* ── Card header ── */
.card-header{
  background:var(--teal-dark);
  color:white;
  padding:14px 20px;
  font-size:15px;
  font-weight:800;
  display:flex;align-items:center;gap:8px;
}
.card-header .count-badge{
  background:rgba(255,255,255,.2);
  color:white;
  border-radius:50px;
  padding:2px 10px;
  font-size:12px;
  font-family:'Space Mono',monospace;
  font-weight:700;
  margin-left:auto;
}

/* ── Card body ── */
.card-body{padding:20px}

/* ── Form fields ── */
.form-group{margin-bottom:15px}
.form-group label{display:block;font-size:13px;font-weight:700;color:var(--dark-2);margin-bottom:6px}
.form-group label .req{color:var(--red);margin-left:2px}
.form-group label .opt{color:var(--gray);font-weight:600;font-size:12px}
.form-group input[type=text],
.form-group textarea{
  width:100%;padding:9px 13px;
  border:1.5px solid var(--cream-dark);border-radius:8px;
  font-family:'Nunito Sans',sans-serif;font-size:14px;
  background:var(--cream);color:var(--dark);
  transition:.2s;
}
.form-group input[type=text]:focus,
.form-group textarea:focus{
  outline:none;border-color:var(--teal);background:white;
}
.form-group textarea{resize:vertical;min-height:96px;line-height:1.6}

/* Image upload area */
.img-upload-area{
  border:2px dashed var(--gray-light);border-radius:10px;
  padding:20px;text-align:center;cursor:pointer;
  transition:.2s;background:var(--cream);position:relative;
}
.img-upload-area:hover,.img-upload-area.drag-over{border-color:var(--orange);background:rgba(232,130,30,.06)}
.img-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-upload-icon{font-size:26px;margin-bottom:5px;display:block}
.img-upload-text{font-size:13px;color:var(--gray);font-weight:600}
.img-upload-text strong{color:var(--orange)}
.img-upload-hint{font-size:11px;color:var(--gray-light);margin-top:3px}

.img-preview-wrap{
  display:none;margin-top:10px;border-radius:8px;overflow:hidden;
  border:1.5px solid var(--cream-dark);position:relative;
}
.img-preview-wrap.show{display:block}
.img-preview-wrap img{width:100%;max-height:180px;object-fit:cover;display:block}
.img-preview-bar{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--cream);padding:7px 12px;font-size:13px;
}
.img-preview-name{font-weight:700;color:var(--dark);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.img-preview-size{font-size:11px;color:var(--gray)}
.img-remove{background:none;border:none;cursor:pointer;color:var(--red);font-size:17px;opacity:.7;transition:.2s;line-height:1}
.img-remove:hover{opacity:1}

/* Submit button */
.submit-btn{
  margin-top:16px;width:100%;padding:12px;
  background:var(--teal-dark);
  color:white;border:none;border-radius:9px;
  font-family:'Nunito Sans',sans-serif;font-size:14px;font-weight:800;
  cursor:pointer;transition:.2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.submit-btn:hover{background:var(--teal)}
.submit-btn:disabled{opacity:.45;cursor:not-allowed}

/* Upload message */
.upload-msg{
  display:none;margin-top:10px;padding:9px 13px;
  border-radius:8px;font-size:13px;font-weight:600;
}
.upload-msg.show{display:block}
.upload-msg.success{background:rgba(31,144,104,.1);color:var(--green);border:1px solid rgba(31,144,104,.2)}
.upload-msg.error{background:rgba(192,57,43,.08);color:var(--red);border:1px solid rgba(192,57,43,.15)}

/* Divider */
.divider{border:none;border-top:1.5px solid var(--cream-dark);margin:18px 0}

/* Sync button */
.btn-sync-news{
  width:100%;padding:10px 16px;
  border:2px solid var(--teal-dark);
  background:transparent;
  color:var(--teal-dark);
  border-radius:8px;
  font-size:13px;font-family:'Nunito Sans',sans-serif;font-weight:700;
  cursor:pointer;transition:.2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-sync-news:hover{background:var(--teal-dark);color:white}
.btn-sync-news.loading{opacity:.6;cursor:not-allowed}

.sync-info{
  margin-top:8px;font-size:11px;color:var(--gray);
  text-align:center;line-height:1.5;
}

/* ── News feed (right column) ── */
.news-feed-wrap{
  max-height:80vh;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.news-feed-wrap::-webkit-scrollbar{width:5px}
.news-feed-wrap::-webkit-scrollbar-track{background:transparent}
.news-feed-wrap::-webkit-scrollbar-thumb{background:var(--gray-light);border-radius:4px}

/* Empty state */
.news-empty{
  text-align:center;padding:40px 16px;color:var(--gray);
  border:1.5px dashed var(--cream-dark);border-radius:10px;
}
.news-empty .ei{font-size:40px;margin-bottom:10px;display:block;opacity:.45}
.news-empty p{font-size:14px;font-weight:700;margin-bottom:5px}
.news-empty small{font-size:12px;opacity:.65}

/* News card */
.news-card{
  background:var(--cream);border-radius:10px;
  border:1.5px solid var(--cream-dark);
  padding:16px;
  transition:border-color .2s, box-shadow .2s;
  opacity:0;transform:translateY(10px);
}
.news-card.revealed{opacity:1;transform:none;transition:opacity .4s ease,transform .4s ease}
.news-card:hover{border-color:var(--orange-light);box-shadow:0 4px 18px rgba(232,130,30,.1)}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.hot-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(244,164,74,.15);border:1px solid rgba(244,164,74,.3);
  color:var(--orange);border-radius:50px;
  padding:2px 10px;font-size:11px;font-weight:800;
  letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;flex-shrink:0;
}
.card-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.card-date{font-size:11px;color:var(--gray);font-weight:600;white-space:nowrap}
.source-badge{
  font-size:10px;font-weight:700;
  background:rgba(13,110,122,.1);color:var(--teal);
  border-radius:50px;padding:2px 8px;white-space:nowrap;
}

.card-img-top{
  margin-bottom:10px;border-radius:8px;overflow:hidden;
  border:1px solid var(--cream-dark);
  aspect-ratio:16/9;
}
.card-img-top img{
  width:100%;height:100%;object-fit:cover;
  display:block;transition:.3s;
}
.card-img-top img:hover{transform:scale(1.01)}

.card-title{
  font-size:14px;font-weight:800;color:var(--dark);line-height:1.35;
  margin-bottom:7px;
}

.card-content{font-size:13px;color:var(--gray);line-height:1.6}
.card-content.clamped{
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;
  overflow:hidden;
}

.toggle-expand{
  background:none;border:none;cursor:pointer;
  color:var(--teal);font-size:12px;font-weight:700;
  padding:0;margin-top:5px;font-family:'Nunito Sans',sans-serif;
  transition:.15s;display:block;
}
.toggle-expand:hover{color:var(--teal-dark)}

.card-footer{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:12px;padding-top:10px;
  border-top:1px solid var(--cream-dark);
  gap:8px;flex-wrap:wrap;
}
.source-link{
  font-size:12px;color:var(--teal);font-weight:700;
  transition:.15s;
}
.source-link:hover{color:var(--teal-dark)}

.btn-hapus{
  display:flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:50px;
  background:rgba(192,57,43,.07);color:var(--red);
  border:none;cursor:pointer;font-size:12px;font-weight:700;
  font-family:'Nunito Sans',sans-serif;transition:.2s;
  white-space:nowrap;
}
.btn-hapus:hover{background:rgba(192,57,43,.15)}

/* ── Delete Modal ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(18,40,48,.5);z-index:200;
  align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex}
.modal{
  background:white;border-radius:var(--radius);padding:26px;
  max-width:380px;width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.22);
  animation:modal-in .2s ease;
}
@keyframes modal-in{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal h3{font-size:16px;font-weight:800;color:var(--dark);margin-bottom:8px}
.modal .modal-news-title{
  font-size:13px;font-style:italic;color:var(--teal-dark);
  background:var(--cream);border-radius:8px;padding:9px 13px;
  margin-bottom:14px;line-height:1.4;border-left:3px solid var(--orange);
}
.modal p.modal-warn{font-size:13px;color:var(--gray);margin-bottom:18px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{
  padding:9px 18px;border-radius:50px;
  border:1.5px solid var(--cream-dark);background:var(--cream);
  font-family:'Nunito Sans',sans-serif;font-size:13px;font-weight:700;
  color:var(--gray);cursor:pointer;transition:.2s;
}
.btn-cancel:hover{border-color:var(--gray-light);color:var(--dark)}
.btn-confirm-delete{
  padding:9px 18px;border-radius:50px;
  background:var(--red);color:white;border:none;
  font-family:'Nunito Sans',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:.2s;
}
.btn-confirm-delete:hover{background:#a93226}
.btn-confirm-delete:disabled{opacity:.5;cursor:not-allowed}

/* ── Responsive ── */
@media(max-width:768px){
  .page-body{padding:14px 12px}
  .two-col{grid-template-columns:1fr}
  .news-feed-wrap{max-height:none}
  .nav-breadcrumb{display:none}
}
@media(max-width:480px){
  .modal-actions{flex-direction:column-reverse}
  .btn-cancel,.btn-confirm-delete{width:100%;text-align:center;min-height:44px}
  .card-top{flex-wrap:wrap}
  .card-footer{flex-direction:column;align-items:flex-start}
  .btn-hapus{align-self:flex-end}
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-brand">🏥 Casemix</div>
  <div class="nav-breadcrumb">
    <a href="/">Dairy Meruno</a>
    <span class="sep">›</span>
    <a href="/casemix">Casemix</a>
    <span class="sep">›</span>
    <span class="current">Hot News</span>
  </div>
  <a href="/casemix" class="nav-back">← Casemix</a>
</nav>

<!-- Page Body -->
<div class="page-body">
  <div class="two-col">

    <!-- LEFT: News form card -->
    <div class="card">
      <div class="card-header">✍️ Tambah Berita</div>
      <div class="card-body">

        <form id="news-form" novalidate>
          <div class="form-group">
            <label for="inp-title">Judul <span class="req">*</span></label>
            <input type="text" id="inp-title" name="title" placeholder="Contoh: Sosialisasi Regulasi BPJS Terbaru" autocomplete="off">
          </div>

          <div class="form-group">
            <label for="inp-content">Isi / Konten <span class="req">*</span></label>
            <textarea id="inp-content" name="content" rows="4" placeholder="Tulis isi pengumuman atau berita di sini..."></textarea>
          </div>

          <div class="form-group">
            <label>Foto <span class="opt">(opsional)</span></label>
            <div class="img-upload-area" id="img-upload-area">
              <input type="file" id="inp-image" name="image" accept=".jpg,.jpeg,.png,.webp,.gif">
              <span class="img-upload-icon">🖼️</span>
              <div class="img-upload-text"><strong>Pilih foto</strong> atau seret ke sini</div>
              <div class="img-upload-hint">JPG, JPEG, PNG, WEBP, GIF</div>
            </div>
            <div class="img-preview-wrap" id="img-preview-wrap">
              <img id="img-preview" src="" alt="Preview">
              <div class="img-preview-bar">
                <span class="img-preview-name" id="img-preview-name">—</span>
                <span class="img-preview-size" id="img-preview-size">—</span>
                <button type="button" class="img-remove" id="img-remove" title="Hapus foto">✕</button>
              </div>
            </div>
          </div>

          <button type="submit" class="submit-btn" id="submit-btn">🔥 Tambah Berita</button>
          <div class="upload-msg" id="upload-msg"></div>
        </form>

        <hr class="divider">

        <button type="button" class="btn-sync-news" id="btn-sync-news" onclick="syncNews()">
          🔄 Sinkronisasi dari wavahusada.com
        </button>
        <div class="sync-info">Berita dari wavahusada.com akan disinkronkan otomatis</div>

      </div>
    </div>

    <!-- RIGHT: News feed card -->
    <div class="card">
      <div class="card-header">
        📰 Berita Terkini
        <span class="count-badge" id="feed-count">0</span>
      </div>
      <div class="card-body">
        <div class="news-feed-wrap" id="news-feed">
          <!-- cards rendered by JS -->
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>🗑️ Hapus Berita?</h3>
    <div class="modal-news-title" id="modal-news-title">—</div>
    <p class="modal-warn">Tindakan ini tidak dapat dibatalkan. Berita akan dihapus permanen.</p>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel">Batal</button>
      <button class="btn-confirm-delete" id="btn-confirm-delete">🗑️ Hapus</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ── Utility ── */
function escHtml(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmtSize(bytes){
  if(bytes < 1024) return bytes + ' B';
  if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

/* ── State ── */
let pendingDeleteId = null;
let pendingDeleteTitle = '';

/* ── Load News ── */
async function loadNews(){
  try{
    const r = await fetch('/casemix/api/news');
    if(!r.ok) throw new Error('Server error: ' + r.status);
    const data = await r.json();
    renderFeed(data.news || [], data.count || 0);
  } catch(e){
    document.getElementById('news-feed').innerHTML =
      '<div class="news-empty"><span class="ei">⚠️</span><p>Gagal memuat berita</p><small>Pastikan server berjalan dan coba reload</small></div>';
  }
}

/* ── Render Feed ── */
function renderFeed(news, count){
  document.getElementById('feed-count').textContent = count;

  const feed = document.getElementById('news-feed');

  if(!news.length){
    feed.innerHTML = '<div class="news-empty"><span class="ei">📢</span><p>Belum ada berita</p><small>Tambahkan berita pertama menggunakan form di sebelah kiri</small></div>';
    return;
  }

  feed.innerHTML = news.map(n => buildCard(n)).join('');

  /* reveal animation */
  const cards = feed.querySelectorAll('.news-card');
  cards.forEach((card, i) => {
    setTimeout(() => card.classList.add('revealed'), i * 80);
  });

  /* attach expand/collapse */
  feed.querySelectorAll('.toggle-expand').forEach(btn => {
    btn.addEventListener('click', handleExpand);
  });

  /* attach delete */
  feed.querySelectorAll('.btn-hapus').forEach(btn => {
    btn.addEventListener('click', () => {
      openDeleteModal(btn.dataset.id, btn.dataset.title);
    });
  });
}

function buildCard(n){
  const longContent = n.content && n.content.length > 150;
  const contentHtml = longContent
    ? `<div class="card-content clamped" id="content-${escAttr(n.id)}">${escHtml(n.content)}</div>
       <button class="toggle-expand" data-id="${escAttr(n.id)}" data-expanded="false">Selengkapnya ▾</button>`
    : `<div class="card-content">${escHtml(n.content)}</div>`;

  const imgHtml = n.img_url
    ? `<div class="card-img-top"><img src="${escHtml(n.img_url)}" alt="${escAttr(n.title)}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`
    : '';

  const sourceLinkHtml = n.source_url
    ? `<a class="source-link" href="${escHtml(n.source_url)}" target="_blank" rel="noopener noreferrer">Lihat sumber →</a>`
    : '<span></span>';

  const sourceBadge = n.source_url
    ? `<span class="source-badge">wavahusada.com</span>`
    : '';

  return `
<article class="news-card" data-id="${escAttr(n.id)}">
  <div class="card-top">
    <span class="hot-badge">🔥 HOT</span>
    <div class="card-meta">
      <span class="card-date">${escHtml(n.published_at_display || '')}</span>
      ${sourceBadge}
    </div>
  </div>
  ${imgHtml}
  <div class="card-title">${escHtml(n.title)}</div>
  ${contentHtml}
  <div class="card-footer">
    ${sourceLinkHtml}
    <button class="btn-hapus" data-id="${escAttr(n.id)}" data-title="${escAttr(n.title)}">🗑️ Hapus</button>
  </div>
</article>`.trim();
}

/* ── Expand / Collapse ── */
function handleExpand(e){
  const btn = e.currentTarget;
  const id = btn.dataset.id;
  const expanded = btn.dataset.expanded === 'true';
  const contentEl = document.getElementById('content-' + id);
  if(!contentEl) return;

  if(expanded){
    contentEl.classList.add('clamped');
    btn.dataset.expanded = 'false';
    btn.textContent = 'Selengkapnya ▾';
  } else {
    contentEl.classList.remove('clamped');
    btn.dataset.expanded = 'true';
    btn.textContent = 'Sembunyikan ▴';
  }
}

/* ── Image Preview ── */
const inpImage = document.getElementById('inp-image');
const imgUploadArea = document.getElementById('img-upload-area');
const imgPreviewWrap = document.getElementById('img-preview-wrap');
const imgPreview = document.getElementById('img-preview');
const imgPreviewName = document.getElementById('img-preview-name');
const imgPreviewSize = document.getElementById('img-preview-size');
const imgRemove = document.getElementById('img-remove');

inpImage.addEventListener('change', () => {
  const file = inpImage.files[0];
  if(!file) return;
  showImgPreview(file);
});

function showImgPreview(file){
  const reader = new FileReader();
  reader.onload = e => {
    imgPreview.src = e.target.result;
    imgPreviewName.textContent = file.name;
    imgPreviewSize.textContent = fmtSize(file.size);
    imgPreviewWrap.classList.add('show');
    imgUploadArea.style.display = 'none';
  };
  reader.readAsDataURL(file);
}

imgRemove.addEventListener('click', () => {
  inpImage.value = '';
  imgPreview.src = '';
  imgPreviewWrap.classList.remove('show');
  imgUploadArea.style.display = '';
});

/* drag-over visual */
imgUploadArea.addEventListener('dragover', e => { e.preventDefault(); imgUploadArea.classList.add('drag-over'); });
imgUploadArea.addEventListener('dragleave', () => imgUploadArea.classList.remove('drag-over'));
imgUploadArea.addEventListener('drop', e => {
  e.preventDefault();
  imgUploadArea.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if(file && /\.(jpe?g|png|webp|gif)$/i.test(file.name)){
    const dt = new DataTransfer();
    dt.items.add(file);
    inpImage.files = dt.files;
    showImgPreview(file);
  }
});

/* ── Form Submit ── */
const newsForm = document.getElementById('news-form');
const submitBtn = document.getElementById('submit-btn');
const uploadMsg = document.getElementById('upload-msg');

newsForm.addEventListener('submit', async e => {
  e.preventDefault();
  const title = document.getElementById('inp-title').value.trim();
  const content = document.getElementById('inp-content').value.trim();

  if(!title){
    showMsg('error', '⚠️ Judul berita wajib diisi.');
    document.getElementById('inp-title').focus();
    return;
  }
  if(!content){
    showMsg('error', '⚠️ Konten berita wajib diisi.');
    document.getElementById('inp-content').focus();
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = '⏳ Mempublikasikan...';
  hideMsg();

  const fd = new FormData();
  fd.append('title', title);
  fd.append('content', content);
  const imageFile = inpImage.files[0];
  if(imageFile) fd.append('image', imageFile);

  try{
    const r = await fetch('/casemix/upload/hotnews', { method:'POST', body:fd });
    const data = await r.json().catch(()=>({}));
    if(r.ok && data.ok){
      const imgNote = imageFile ? sizeNotice(data.original_size, data.compressed_size) : '';
      showMsg('success', '✅ Berita berhasil dipublikasikan!' + imgNote);
      newsForm.reset();
      imgRemove.click();
      await loadNews();
    } else {
      showMsg('error', '❌ Gagal: ' + (data.error || r.statusText || 'Terjadi kesalahan'));
    }
  } catch(err){
    showMsg('error', '❌ Koneksi gagal. Pastikan server berjalan.');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '🔥 Tambah Berita';
  }
});

function fmtSz(b){ if(!b)return'—'; if(b<1048576)return(b/1024).toFixed(0)+' KB'; return(b/1048576).toFixed(1)+' MB'; }
function sizeNotice(orig,comp){
  if(!orig||!comp) return '';
  const pct = orig>comp ? Math.round((1-comp/orig)*100) : 0;
  return pct>1
    ? `<br><small style="opacity:.7;font-size:11px">📦 ${fmtSz(orig)} → ${fmtSz(comp)} (hemat ${pct}%)</small>`
    : `<br><small style="opacity:.7;font-size:11px">📦 Ukuran: ${fmtSz(comp)}</small>`;
}
function showMsg(type, text){
  uploadMsg.innerHTML = text;
  uploadMsg.className = 'upload-msg show ' + type;
  if(type === 'success') setTimeout(hideMsg, 5000);
}
function hideMsg(){
  uploadMsg.className = 'upload-msg';
  uploadMsg.innerHTML = '';
}

/* ── Delete Modal ── */
const modalOverlay = document.getElementById('modal-overlay');
const modalNewsTitle = document.getElementById('modal-news-title');
const btnCancel = document.getElementById('btn-cancel');
const btnConfirmDelete = document.getElementById('btn-confirm-delete');

function openDeleteModal(id, title){
  pendingDeleteId = id;
  pendingDeleteTitle = title;
  modalNewsTitle.textContent = title;
  modalOverlay.classList.add('show');
}

function closeModal(){
  modalOverlay.classList.remove('show');
  pendingDeleteId = null;
  pendingDeleteTitle = '';
  btnConfirmDelete.disabled = false;
  btnConfirmDelete.textContent = '🗑️ Hapus';
}

btnCancel.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => {
  if(e.target === modalOverlay) closeModal();
});
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closeModal();
});

btnConfirmDelete.addEventListener('click', async () => {
  if(!pendingDeleteId) return;
  btnConfirmDelete.disabled = true;
  btnConfirmDelete.textContent = '⏳ Menghapus...';

  try{
    const r = await fetch('/casemix/delete/hotnews/' + pendingDeleteId, { method:'DELETE' });
    const data = await r.json();
    if(data.ok){
      closeModal();
      await loadNews();
    } else {
      closeModal();
      alert('Gagal menghapus: ' + (data.error || 'Terjadi kesalahan'));
    }
  } catch(err){
    closeModal();
    alert('Koneksi gagal. Pastikan server berjalan.');
  }
});

/* ── Toast ── */
function showToast(msg, type='success'){
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;z-index:9999;background:${type==='error'?'#e53e3e':'#2f855a'};box-shadow:0 4px 16px rgba(0,0,0,.18);font-family:'Nunito Sans',sans-serif;font-weight:700;max-width:320px;line-height:1.4`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

/* ── Sync dari wavahusada.com ── */
async function syncNews(){
  const btn = document.getElementById('btn-sync-news');
  btn.classList.add('loading');
  btn.disabled = true;
  btn.textContent = '🔄 Mengambil data...';
  try{
    const res = await fetch('/casemix/api/sync-news', { method: 'POST' });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Gagal sync');
    showToast(`✅ ${data.added} berita baru ditambahkan dari wavahusada.com`);
    loadNews();
  } catch(e){
    showToast('❌ ' + e.message, 'error');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
    btn.textContent = '🔄 Sinkronisasi dari wavahusada.com';
  }
}

/* ── Init ── */
loadNews();
</script>
